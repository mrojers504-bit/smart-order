version: '3.9'

services:
  backend:
    build: ./backend
    container_name: smart-order-backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./config:/app/config:ro
      - ./mock:/app/mock:ro
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: smart-order-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: smart-order-net
